# Global defaults (all overridable per stack)
defaults:
  poll_interval: 60
  branch: main
  # work_dir defaults to /opt/stack-agent/data — omit unless you need a custom path
  # token is not required — stack-agent falls back to STACK_AGENT_DEFAULT_TOKEN automatically

stacks:
  - name: immich
    repo: https://github.com/example/host-services.git
    path: stacks/immich
    branch: main
    env_file: /opt/stack-agent/env/immich.env
    poll_interval: 60

  - name: nextcloud
    repo: https://github.com/example/host-services.git
    path: stacks/nextcloud
    env_file: /opt/stack-agent/env/nextcloud.env
    poll_interval: 120
